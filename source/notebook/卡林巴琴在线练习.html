<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>卡林巴琴在线练习 - 17键</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --text: #e0e0e0;
            --accent: #d4a574;
            --key-default: #c8c8d4;
            --key-hover: #b0b0bc;
            --key-active: #909098;
            --key-pressed: #787880;
            --bar-color: #5a5040;
            --correct: #4caf84;
            --wrong: #e05555;
            --golden: #d4a574;
            --highlight: #ffb74d;
            --highlight-glow: #ff9800;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            transition: background 0.3s;
        }

        .header {
            text-align: center;
            padding: 16px 20px 8px;
            transition: all 0.35s ease;
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .header .title {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--accent);
            text-shadow: 0 2px 8px rgba(212, 167, 116, 0.3);
        }

        .header .subtitle {
            font-size: 0.85rem;
            color: #999;
            letter-spacing: 0.03em;
        }

        .header .mode-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .footer {
            text-align: center;
            padding: 10px 20px 20px;
            font-size: 0.75rem;
            color: #666;
            transition: all 0.35s ease;
            width: 100%;
            max-width: 900px;
            letter-spacing: 0.02em;
        }

        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 900px;
            padding: 8px 12px;
            position: relative;
            transition: all 0.35s ease;
        }

        .kalimba-wrapper {
            position: relative;
            width: 100%;
            max-width: 850px;
            aspect-ratio: 850 / 500;
            cursor: pointer;
            touch-action: none;
            -webkit-touch-callout: none;
            transition: all 0.3s ease;
        }

        .kalimba-wrapper svg {
            width: 100%;
            height: 100%;
            display: block;
            filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.4));
        }

        .key-path {
            fill: #c8c8d4;
            stroke: #b0b0b8;
            stroke-width: 1.2;
            cursor: pointer;
            transition: fill 0.08s ease;
            vector-effect: non-scaling-stroke;
        }

        .key-path:hover {
            fill: #b8b8c4;
            stroke: #a0a0a8;
        }

        .key-path:active {
            fill: #9696a0;
        }

        .key-path.pressed {
            fill: #888894;
            stroke: #777780;
        }

        /* 曲谱高亮 */
        .key-path.score-highlight {
            fill: #ffcc80;
            stroke: #ff9800;
            stroke-width: 2.5;
            filter: drop-shadow(0 0 8px #ff9800);
            animation: pulse-glow 1.2s ease-in-out infinite alternate;
        }

        @keyframes pulse-glow {
            from {
                filter: drop-shadow(0 0 6px #ff9800);
            }

            to {
                filter: drop-shadow(0 0 14px #ffb74d);
            }
        }

        .jianpu-text {
            fill: #3a3a44;
            font-family: 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', sans-serif;
            text-anchor: middle;
            pointer-events: none;
            font-weight: 600;
            transition: opacity 0.25s;
        }

        .jianpu-dot {
            fill: #3a3a44;
            pointer-events: none;
            transition: opacity 0.25s;
        }

        .test-mode-active .jianpu-text,
        .test-mode-active .jianpu-dot {
            opacity: 0;
        }

        .clamp-bar {
            fill: #5a5040;
            stroke: #3d3528;
            stroke-width: 1.5;
            vector-effect: non-scaling-stroke;
        }

        .clamp-screw {
            fill: #3d3528;
            pointer-events: none;
        }

        /* 面板通用样式 */
        .panel {
            position: absolute;
            top: 2%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(22, 33, 62, 0.92);
            border: 1.5px solid rgba(212, 167, 116, 0.5);
            border-radius: 20px;
            padding: 6px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 20;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            white-space: nowrap;
            flex-wrap: wrap;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
        }

        .panel.hidden {
            display: none;
        }

        .test-target,
        .score-target {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .test-target .note-name,
        .score-target .note-names {
            color: var(--accent);
            font-size: 1.1rem;
            background: rgba(212, 167, 116, 0.15);
            padding: 3px 10px;
            border-radius: 12px;
            letter-spacing: 0.03em;
        }

        .score-target .note-names {
            display: flex;
            gap: 4px;
        }

        .test-target .jianpu-display,
        .score-target .jianpu-display {
            font-size: 1.5rem;
            color: #fff;
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
        }

        .test-target .dot-above,
        .score-target .dot-above {
            position: absolute;
            top: -8px;
            font-size: 0.55rem;
            color: #ffcc80;
            letter-spacing: 1px;
            line-height: 1;
        }

        .test-feedback,
        .score-feedback {
            font-size: 0.85rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 10px;
            letter-spacing: 0.03em;
            animation: fadeInOut 0.6s ease;
        }

        .test-feedback.correct,
        .score-feedback.correct {
            color: #4caf84;
            background: rgba(76, 175, 132, 0.15);
        }

        .test-feedback.wrong,
        .score-feedback.wrong {
            color: #e05555;
            background: rgba(224, 85, 85, 0.15);
        }

        .test-score,
        .score-progress {
            font-size: 0.8rem;
            color: #aaa;
            letter-spacing: 0.03em;
        }

        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }

            30% {
                opacity: 1;
                transform: scale(1.05);
            }

            100% {
                opacity: 0.9;
                transform: scale(1);
            }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            cursor: pointer;
            border: 1.5px solid transparent;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.06);
            color: #ccc;
            white-space: nowrap;
            touch-action: manipulation;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn:active {
            background: rgba(255, 255, 255, 0.18);
            transform: scale(0.96);
        }

        .btn.accent {
            background: rgba(212, 167, 116, 0.2);
            border-color: rgba(212, 167, 116, 0.5);
            color: var(--accent);
            font-weight: 700;
        }

        .btn.accent:hover {
            background: rgba(212, 167, 116, 0.3);
        }

        .btn.small {
            padding: 5px 10px;
            font-size: 0.7rem;
            border-radius: 14px;
        }

        .fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 14px;
            z-index: 25;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.07);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: #ccc;
            font-size: 1rem;
            touch-action: manipulation;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.35);
        }

        .fullscreen-btn:active {
            transform: scale(0.9);
        }

        body.fullscreen-mode .header {
            opacity: 0;
            max-height: 0;
            padding: 0;
            overflow: hidden;
            pointer-events: none;
        }

        body.fullscreen-mode .footer {
            opacity: 0;
            max-height: 0;
            padding: 0;
            overflow: hidden;
            pointer-events: none;
        }

        body.fullscreen-mode .main-container {
            padding: 4px;
            flex: 1;
            max-width: 100%;
        }

        body.fullscreen-mode .kalimba-wrapper {
            max-width: 100%;
            aspect-ratio: auto;
            height: 100%;
            max-height: 100vh;
            max-height: 100dvh;
        }

        body.fullscreen-mode {
            background: #0d0d18;
        }

        @media (orientation: landscape) and (max-height: 600px) {
            .kalimba-wrapper {
                max-width: 95vw;
                aspect-ratio: 850 / 480;
            }

            .header {
                padding: 4px 10px;
            }

            .header .title {
                font-size: 1.2rem;
            }

            .header .subtitle {
                font-size: 0.7rem;
            }

            .panel {
                padding: 4px 12px;
                gap: 8px;
                border-radius: 14px;
                top: 1%;
            }

            .test-target,
            .score-target {
                font-size: 1rem;
            }

            .test-target .jianpu-display,
            .score-target .jianpu-display {
                font-size: 1.1rem;
            }

            .test-target .note-name,
            .score-target .note-names {
                font-size: 0.85rem;
                padding: 2px 8px;
            }

            .btn {
                padding: 5px 10px;
                font-size: 0.7rem;
            }

            .fullscreen-btn {
                width: 28px;
                height: 28px;
                top: 6px;
                right: 8px;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 480px) {
            .header .title {
                font-size: 1.3rem;
            }

            .panel {
                padding: 4px 10px;
                gap: 6px;
                border-radius: 14px;
            }

            .test-target,
            .score-target {
                font-size: 0.95rem;
            }

            .test-target .jianpu-display,
            .score-target .jianpu-display {
                font-size: 1.1rem;
                min-width: 22px;
            }

            .test-target .note-name,
            .score-target .note-names {
                font-size: 0.8rem;
                padding: 2px 7px;
            }

            .btn {
                padding: 4px 8px;
                font-size: 0.68rem;
            }

            .fullscreen-btn {
                width: 28px;
                height: 28px;
                top: 6px;
                right: 6px;
            }

            .kalimba-wrapper {
                aspect-ratio: 850 / 480;
            }
        }
    </style>
</head>

<body>

    <header class="header" id="header">
        <div class="title">🎵 卡林巴琴练习</div>
        <div class="subtitle">17键 · 点击琴键发声 · 支持滑音与和弦</div>
        <div class="mode-buttons">
            <button class="btn" id="testModeBtn">🎯 练习模式</button>
            <button class="btn" id="scoreModeBtn">🎼 曲谱模式</button>
        </div>
    </header>

    <div class="main-container" id="mainContainer">
        <div class="kalimba-wrapper" id="kalimbaWrapper">
            <button class="fullscreen-btn" id="fullscreenBtn" title="切换全屏模式" aria-label="全屏切换">⛶</button>

            <!-- 测试面板 -->
            <div class="panel hidden" id="testPanel">
                <span style="font-size:0.75rem;color:#999;">📋 测试</span>
                <span class="test-target" id="testTarget">
                    <span class="note-name">C4</span>
                    <span class="jianpu-display">1<span class="dot-above"></span></span>
                </span>
                <span class="test-feedback" id="testFeedback"></span>
                <span class="test-score" id="testScore">✅ 0</span>
                <button class="btn small accent" id="testToggleBtn">退出测试</button>
            </div>

            <!-- 曲谱面板 -->
            <div class="panel hidden" id="scorePanel">
                <span style="font-size:0.75rem;color:#999;">🎼 曲谱</span>
                <span class="score-target" id="scoreTarget">
                    <span class="note-names">C4</span>
                    <span class="jianpu-display">1<span class="dot-above"></span></span>
                </span>
                <span class="score-feedback" id="scoreFeedback"></span>
                <span class="score-progress" id="scoreProgress">0/0</span>
                <button class="btn small accent" id="scoreExitBtn">退出曲谱</button>
            </div>

            <svg id="kalimbaSvg" viewBox="0 0 850 500" xmlns="http://www.w3.org/2000/svg">
                <rect x="15" y="60" width="820" height="420" rx="16" ry="16" fill="#2a2218" stroke="#3d3528"
                    stroke-width="2" />
                <rect x="25" y="68" width="800" height="404" rx="12" ry="12" fill="#3d3222" opacity="0.7" />
                <rect class="clamp-bar" x="20" y="68" width="810" height="22" rx="10" ry="10" />
                <circle class="clamp-screw" cx="55" cy="79" r="5" />
                <circle class="clamp-screw" cx="220" cy="79" r="5" />
                <circle class="clamp-screw" cx="385" cy="79" r="5" />
                <circle class="clamp-screw" cx="550" cy="79" r="5" />
                <circle class="clamp-screw" cx="715" cy="79" r="5" />
                <circle class="clamp-screw" cx="795" cy="79" r="5" />
                <g id="keysGroup"></g>
                <g id="labelsGroup"></g>
            </svg>
        </div>
    </div>

    <footer class="footer" id="footer">Deepseek V4 Pro提供计算支持</footer>

    <script>
        (function () {
            // ============ 音符数据 ============
            const noteData = [
                { index: 0, name: 'D6', freq: 1174.66, jianpuNum: '2', dotsAbove: 2, semitoneFromC4: 26 },
                { index: 1, name: 'B5', freq: 987.77, jianpuNum: '7', dotsAbove: 1, semitoneFromC4: 23 },
                { index: 2, name: 'G5', freq: 783.99, jianpuNum: '5', dotsAbove: 1, semitoneFromC4: 19 },
                { index: 3, name: 'E5', freq: 659.25, jianpuNum: '3', dotsAbove: 1, semitoneFromC4: 16 },
                { index: 4, name: 'C5', freq: 523.25, jianpuNum: '1', dotsAbove: 1, semitoneFromC4: 12 },
                { index: 5, name: 'A4', freq: 440.00, jianpuNum: '6', dotsAbove: 0, semitoneFromC4: 9 },
                { index: 6, name: 'F4', freq: 349.23, jianpuNum: '4', dotsAbove: 0, semitoneFromC4: 5 },
                { index: 7, name: 'D4', freq: 293.66, jianpuNum: '2', dotsAbove: 0, semitoneFromC4: 2 },
                { index: 8, name: 'C4', freq: 261.63, jianpuNum: '1', dotsAbove: 0, semitoneFromC4: 0 },
                { index: 9, name: 'E4', freq: 329.63, jianpuNum: '3', dotsAbove: 0, semitoneFromC4: 4 },
                { index: 10, name: 'G4', freq: 392.00, jianpuNum: '5', dotsAbove: 0, semitoneFromC4: 7 },
                { index: 11, name: 'B4', freq: 493.88, jianpuNum: '7', dotsAbove: 0, semitoneFromC4: 11 },
                { index: 12, name: 'D5', freq: 587.33, jianpuNum: '2', dotsAbove: 1, semitoneFromC4: 14 },
                { index: 13, name: 'F5', freq: 698.46, jianpuNum: '4', dotsAbove: 1, semitoneFromC4: 17 },
                { index: 14, name: 'A5', freq: 880.00, jianpuNum: '6', dotsAbove: 1, semitoneFromC4: 21 },
                { index: 15, name: 'C6', freq: 1046.50, jianpuNum: '1', dotsAbove: 2, semitoneFromC4: 24 },
                { index: 16, name: 'E6', freq: 1318.51, jianpuNum: '3', dotsAbove: 2, semitoneFromC4: 28 },
            ];


            // 构建简谱字符串到索引的映射表
            const jianpuToIndexMap = (() => {
                const map = {};
                for (const item of noteData) {
                    const key = item.jianpuNum + '.'.repeat(item.dotsAbove);
                    map[key] = item.index;
                }
                return map;
            })();

            /**
             * 将简谱字符串（或包含简谱字符串的嵌套数组）转换为对应的索引数字
             * @param {string|Array} input - 简谱字符串或者包含简谱字符串的数组（可嵌套）
             * @returns {number|Array} 转换后的索引数字或数组（结构保持不变）
             */
            function convertJianpuToIndex(input) {
                if (typeof input === 'string') {
                    // 单个简谱字符串转换
                    if (jianpuToIndexMap.hasOwnProperty(input)) {
                        console.log(input)
                        return jianpuToIndexMap[input];
                    } else {
                        throw new Error(`无效的简谱字符串: "${input}"`);
                    }
                } else if (Array.isArray(input)) {
                    // 递归处理数组的每个元素
                    console.log(input)
                    return input.map(item => convertJianpuToIndex(item));
                } else {
                    throw new Error(`无效的简谱字符串: "${input}"`);
                    // return input;
                }
            }

            // ============ 曲谱数据（示例：《小星星》片段，含和弦） ============
            // 格式: number (单音) 或 number[] (同时按下的多个键)
            const demoScore = convertJianpuToIndex([
                "4", "1.", "6.",
                "5", "2.", "7.",
                "4", "1.", "6.",
                "5", "2.", "5.",
                // 
                ["4", '4.'], "1.", "6.",
                '5.', '6.', ['7.', '5'], '2.', '7.',
                '1..', '7.', '6.', '5.', ['6.', '4'], '1.', '6',
                '5.', '4.', ['5.', '5'], '2', ['2.', '7'],
                // --
                ["4", '4.'], "1.", "6.",
                '4.', '5.', ['3.', '1'], '5', '4.', '3.', '2.',
                '1.', ['2.', '4'], '1.', ['6.', '6'],
                // --
                '4', '2.', '5.',
                '1.',
                ["4", '4.'], "1.", "6.",
                '5.', '6.', ['7.', '5'], '2.', '7.',
                '1..', '7.', '6.', '5.', ['6.', '4'], '1.', '6',
                '5.',
                '5.', '4.', ['5.', '5'], '2', ['2.', '7'],
                ["4", '4.'], "1.", "6.",
                '4.', '4.', '5.', ['3.', '1'], '5', '2.',
                '1.', ['7', '5', '2.'], '2', '7',
                '2', '5', '2.',
                '6.', '7.', ['1..', '4'], '1', '6',
                '1..', '2..', ['7.', '5'], '2', '6.',
                '5.',
                "4", "1.", "6.",
                '3..',
                ['7.', '5'], '2.', '1..', '7.', '6.',
                '5.', ['6.', '4'], '1', '6',
                '5.', '4.', ['3.', '1'], '3', '5',
                '4.', '3.', '2.', '1.', ['7', '5', '2.'], '2', '7',
                // --
                '2', '5', '2.',
                '6.', '7.', ['1..', '4'], '1', '6',
                '1..', '2..', ['7.', '5'], '2', '6.',
                '5.',
                "4", "1.", "6.",
                '3..',
                ['7.', '5'], '2.', '1..', '7.', '6.',
                '5.', ['6.', '4'], '1', '6',
                '5.', '5.', '4.', ['3.', '1'], '5', '4.', '3.', '2.',
                '1.', '2.', '2', '6',
                // --
                '2', '5', '7',
                '1.',
                ["4", '4.'], "1.", "6.",
                '5.', '6.', ['7.', '5'], '2.', '7.',
                '1..', '7.', '6.', '5.', ['6.', '4'], '1.', '6',
                '5.', '4.', ['5.', '5'], '2', ['2.', '7'],
                ["4", '4.'], "1.", "6.",
                '4.', '5.', ['3.', '1'], '5', '4.', '3.', '2.',
                '1.', ['2.', '4'], '1', ['6.', '6'],
                // --
                '2', '5', '2.', '1.',
                ["4", '4.'], "1.", "6.",
                '5.', '6.', ['7.', '5'], '2.', ['7.', '7'],
                '1..', '7.', '6.', '5.', ['6.', '4'], '1.', '6',
                '5.', '5.', '4.', ['5.', '5'], '2', ['2.', '7'],
                ["4", '4.'], "1.", "6.",
                '4.', '4.', '5.', ['3.', '1'], '5', '2.',
                '1.', ['7', '5', '2.'], '2', '7',
            ]);

            // ============ DOM引用 ============
            const kalimbaWrapper = document.getElementById('kalimbaWrapper');
            const kalimbaSvg = document.getElementById('kalimbaSvg');
            const keysGroup = document.getElementById('keysGroup');
            const labelsGroup = document.getElementById('labelsGroup');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const testPanel = document.getElementById('testPanel');
            const testTarget = document.getElementById('testTarget');
            const testFeedback = document.getElementById('testFeedback');
            const testScore = document.getElementById('testScore');
            const testToggleBtn = document.getElementById('testToggleBtn');
            const testModeBtn = document.getElementById('testModeBtn');
            const scoreModeBtn = document.getElementById('scoreModeBtn');
            const scorePanel = document.getElementById('scorePanel');
            const scoreTarget = document.getElementById('scoreTarget');
            const scoreFeedback = document.getElementById('scoreFeedback');
            const scoreProgress = document.getElementById('scoreProgress');
            const scoreExitBtn = document.getElementById('scoreExitBtn');
            const header = document.getElementById('header');
            const footer = document.getElementById('footer');

            // ============ 全局状态 ============
            let audioCtx = null;
            let currentMode = 'free'; // 'free' | 'test' | 'score'
            const pointerKeyMap = new Map(); // pointerId -> keyIndex
            const keyPathElements = [];
            const keyBounds = [];

            // 测试模式状态
            let testCurrentNote = null;
            let testCorrectCount = 0;
            let testFeedbackTimeout = null;
            let randomIdx = 0;
            let randomArray = [];
            const errorKeyName = "ErrorKey";
            const randomArrayMaxLen = 200;

            // 曲谱模式状态
            let scoreIndex = 0;
            let targetIndices = [];          // 当前目标的索引数组（已排序）
            let pressedIndices = new Set();  // 当前按下的所有键索引
            let waitingForRelease = false;   // 匹配成功后等待所有按键释放
            let canMatch = true;             // 是否允许进行匹配
            let matchingPointers = new Set();// 触发匹配的pointerId集合

            // ============ Audio ============
            function getAudioContext() {
                if (!audioCtx) {
                    try {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    } catch (e) { return null; }
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().catch(() => { });
                }
                return audioCtx;
            }

            function playKalimbaNote(frequency) {
                const ctx = getAudioContext();
                if (!ctx) return;
                const now = ctx.currentTime;
                const duration = 1.0;
                const attackTime = 0.004;
                const masterGain = ctx.createGain();
                masterGain.gain.setValueAtTime(0, now);
                masterGain.gain.linearRampToValueAtTime(1.0, now + attackTime);
                masterGain.gain.setTargetAtTime(0.001, now + attackTime + 0.02, duration * 0.35);
                masterGain.connect(ctx.destination);

                const detuneAmount = 1.8;
                const osc1 = ctx.createOscillator();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(frequency - detuneAmount / 2, now);
                const osc1Gain = ctx.createGain();
                osc1Gain.gain.setValueAtTime(0.55, now);
                osc1.connect(osc1Gain);
                osc1Gain.connect(masterGain);
                osc1.start(now);
                osc1.stop(now + duration + 0.3);

                const osc2 = ctx.createOscillator();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(frequency + detuneAmount / 2, now);
                const osc2Gain = ctx.createGain();
                osc2Gain.gain.setValueAtTime(0.45, now);
                osc2.connect(osc2Gain);
                osc2Gain.connect(masterGain);
                osc2.start(now);
                osc2.stop(now + duration + 0.3);

                setTimeout(() => { try { masterGain.disconnect(); } catch (e) { } }, (duration + 0.5) * 1000);
            }

            // ============ 琴键构建 ============
            const KEY_WIDTH = 46;
            const KEY_GAP = 4;
            const KEY_STEP = KEY_WIDTH + KEY_GAP;
            const TOP_Y = 92;
            const MAX_LENGTH = 330;
            const MIN_LENGTH = 140;
            const SEMITONE_RANGE = 28;
            const LENGTH_PER_SEMITONE = (MAX_LENGTH - MIN_LENGTH) / SEMITONE_RANGE;
            const TOTAL_WIDTH = 17 * KEY_STEP;
            const startX = (850 - 17 * KEY_STEP) / 2 + KEY_GAP / 2;

            function getKeyBottomY(semitoneOffset) {
                return TOP_Y + MAX_LENGTH - semitoneOffset * LENGTH_PER_SEMITONE;
            }

            function buildKeyPath(index) {
                const note = noteData[index];
                const x = startX + index * KEY_STEP;
                const bottomY = getKeyBottomY(note.semitoneFromC4);
                const arcStartY = bottomY - KEY_WIDTH / 2;
                const xLeft = x;
                const xRight = x + KEY_WIDTH;
                const d = `M ${xLeft} ${TOP_Y} L ${xLeft} ${arcStartY} A ${KEY_WIDTH / 2} ${KEY_WIDTH / 2} 0 0 0 ${xRight} ${arcStartY} L ${xRight} ${TOP_Y} Z`;
                return { d, x, bottomY, arcStartY, xLeft, xRight, note };
            }

            function createKeyElements() {
                keysGroup.innerHTML = '';
                labelsGroup.innerHTML = '';
                keyPathElements.length = 0;
                keyBounds.length = 0;

                noteData.forEach((note, index) => {
                    const keyInfo = buildKeyPath(index);
                    keyBounds.push({
                        xLeft: keyInfo.xLeft,
                        xRight: keyInfo.xRight,
                        topY: TOP_Y,
                        bottomY: keyInfo.bottomY,
                        index: index,
                    });

                    const pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    pathEl.setAttribute('d', keyInfo.d);
                    pathEl.setAttribute('class', 'key-path');
                    pathEl.setAttribute('data-key-index', index);
                    pathEl.setAttribute('data-note-name', note.name);
                    pathEl.setAttribute('id', `key-${index}`);
                    keysGroup.appendChild(pathEl);
                    keyPathElements.push(pathEl);

                    // 简谱标签
                    const labelY = keyInfo.bottomY - KEY_WIDTH / 2 - 18;
                    const labelX = keyInfo.x + KEY_WIDTH / 2;
                    const textEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    textEl.setAttribute('x', labelX);
                    textEl.setAttribute('y', labelY);
                    textEl.setAttribute('class', 'jianpu-text');
                    textEl.setAttribute('font-size', '17');
                    textEl.setAttribute('data-key-index', index);
                    textEl.textContent = note.jianpuNum;
                    labelsGroup.appendChild(textEl);

                    if (note.dotsAbove > 0) {
                        const dotSpacing = 8;
                        const dotStartX = labelX - (note.dotsAbove - 1) * dotSpacing / 2;
                        for (let d = 0; d < note.dotsAbove; d++) {
                            const dotEl = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                            dotEl.setAttribute('cx', dotStartX + d * dotSpacing);
                            dotEl.setAttribute('cy', labelY - 16);
                            dotEl.setAttribute('r', '3');
                            dotEl.setAttribute('class', 'jianpu-dot');
                            dotEl.setAttribute('data-key-index', index);
                            labelsGroup.appendChild(dotEl);
                        }
                    }
                });
            }

            createKeyElements();

            function flashKey(index) {
                const el = keyPathElements[index];
                if (!el) return;
                el.classList.add('pressed');
                setTimeout(() => el.classList.remove('pressed'), 120);
            }

            function triggerNote(index) {
                const note = noteData[index];
                playKalimbaNote(note.freq);
                flashKey(index);

                if (currentMode === 'test' && testCurrentNote) {
                    handleTestAnswer(index);
                }
            }

            // ============ 指针与坐标 ============
            function getKeyIndexFromPoint(clientX, clientY) {
                const el = document.elementFromPoint(clientX, clientY);
                if (el && el.hasAttribute && el.hasAttribute('data-key-index')) {
                    return parseInt(el.getAttribute('data-key-index'), 10);
                }
                const svgRect = kalimbaSvg.getBoundingClientRect();
                const svgX = clientX - svgRect.left;
                const svgY = clientY - svgRect.top;
                const vbX = (svgX / svgRect.width) * 850;
                const vbY = (svgY / svgRect.height) * 500;
                for (const bound of keyBounds) {
                    if (vbX >= bound.xLeft && vbX <= bound.xRight &&
                        vbY >= bound.topY && vbY <= bound.bottomY) {
                        return bound.index;
                    }
                }
                return -1;
            }

            // ============ 事件处理 ============
            function handlePointerDown(e) {
                e.preventDefault();
                const ctx = getAudioContext();
                if (ctx && ctx.state === 'suspended') ctx.resume();

                const keyIndex = getKeyIndexFromPoint(e.clientX, e.clientY);
                if (keyIndex >= 0) {
                    pointerKeyMap.set(e.pointerId, keyIndex);
                    triggerNote(keyIndex);

                    if (currentMode === 'score') {
                        pressedIndices.add(keyIndex);
                        onScoreInputChange();
                    }
                }
            }

            function handlePointerMove(e) {
                e.preventDefault();
                if (!pointerKeyMap.has(e.pointerId)) return;
                const keyIndex = getKeyIndexFromPoint(e.clientX, e.clientY);
                const prevKeyIndex = pointerKeyMap.get(e.pointerId);
                if (keyIndex >= 0 && keyIndex !== prevKeyIndex) {
                    pointerKeyMap.set(e.pointerId, keyIndex);
                    triggerNote(keyIndex);

                    if (currentMode === 'score') {
                        pressedIndices.delete(prevKeyIndex);
                        pressedIndices.add(keyIndex);
                        onScoreInputChange();
                    }
                }
            }

            function handlePointerUp(e) {
                e.preventDefault();
                const keyIndex = pointerKeyMap.get(e.pointerId);
                pointerKeyMap.delete(e.pointerId);

                if (currentMode === 'score' && keyIndex !== undefined) {
                    pressedIndices.delete(keyIndex);
                    onScoreInputChange();
                    // 检查是否释放了匹配指针
                    if (matchingPointers.has(e.pointerId)) {
                        matchingPointers.delete(e.pointerId);
                        if (matchingPointers.size === 0) {
                            waitingForRelease = false;
                            // 如果此时还有键按着，保持 canMatch = false 直到下一次主动按下
                            if (pressedIndices.size === 0) {
                                canMatch = true;
                            }
                            // 否则等待新的 pointerdown 来设置 canMatch = true
                        }
                    }
                }
            }

            function handlePointerLeave(e) {
                if (pointerKeyMap.has(e.pointerId)) {
                    const keyIndex = pointerKeyMap.get(e.pointerId);
                    pointerKeyMap.delete(e.pointerId);
                    if (currentMode === 'score' && keyIndex !== undefined) {
                        pressedIndices.delete(keyIndex);
                        onScoreInputChange();
                    }
                }
            }

            kalimbaWrapper.addEventListener('pointerdown', handlePointerDown, { passive: false });
            kalimbaWrapper.addEventListener('pointermove', handlePointerMove, { passive: false });
            kalimbaWrapper.addEventListener('pointerup', handlePointerUp, { passive: false });
            kalimbaWrapper.addEventListener('pointerleave', handlePointerLeave);
            kalimbaWrapper.addEventListener('pointercancel', handlePointerUp, { passive: false });
            document.addEventListener('pointerup', (e) => {
                if (pointerKeyMap.has(e.pointerId)) {
                    const keyIndex = pointerKeyMap.get(e.pointerId);
                    pointerKeyMap.delete(e.pointerId);
                    if (currentMode === 'score' && keyIndex !== undefined) {
                        pressedIndices.delete(keyIndex);
                        onScoreInputChange();
                    }
                }
            });

            // ============ 测试模式（保留原有逻辑） ============
            function _getNamespaceData(namespace) {
                const key = `freqStore_${namespace}`;
                const raw = localStorage.getItem(key);
                if (!raw) return {};
                try { return JSON.parse(raw); } catch (e) { return {}; }
            }

            function _saveNamespaceData(namespace, data) {
                const key = `freqStore_${namespace}`;
                localStorage.setItem(key, JSON.stringify(data));
            }

            function recordFrequency(namespace, objectName, count) {
                if (typeof namespace !== 'string' || typeof objectName !== 'string' || !Number.isInteger(count) || count <= 0) {
                    throw new Error('Invalid arguments');
                }
                const data = _getNamespaceData(namespace);
                data[objectName] = (data[objectName] || 0) + count;
                _saveNamespaceData(namespace, data);
            }

            function clearNamespace(namespace) {
                if (typeof namespace !== 'string') throw new Error('namespace must be a string');
                localStorage.removeItem(`freqStore_${namespace}`);
            }

            function randomExtract(namespace, n) {
                if (typeof namespace !== 'string' || !Number.isInteger(n) || n < 0) throw new Error('Invalid arguments');
                const data = _getNamespaceData(namespace);
                const entries = Object.entries(data);
                if (entries.length === 0 || n === 0) return [];
                const freqs = entries.map(e => e[1]);
                const total = freqs.reduce((s, f) => s + f, 0);
                if (total === 0) return [];
                const prefix = [];
                let sum = 0;
                for (const f of freqs) { sum += f; prefix.push(sum); }
                const result = [];
                for (let i = 0; i < n; i++) {
                    const rand = Math.random() * total;
                    let left = 0, right = prefix.length - 1;
                    while (left < right) {
                        const mid = Math.floor((left + right) / 2);
                        if (prefix[mid] <= rand) left = mid + 1;
                        else right = mid;
                    }
                    result.push(entries[left][0]);
                }
                return result;
            }

            function getRandomNote() {
                if (testCorrectCount < 5) {
                    return noteData[Math.floor(Math.random() * noteData.length)];
                }
                if (randomIdx >= randomArrayMaxLen) {
                    randomIdx = 0;
                    randomArray = randomExtract(errorKeyName, randomArrayMaxLen);
                }
                const idx = parseInt(randomArray[randomIdx++]);
                return noteData[idx];
            }

            function updateTestDisplay() {
                if (!testCurrentNote) return;
                const note = testCurrentNote;
                testTarget.querySelector('.note-name').textContent = note.name;
                const jianpuSpan = testTarget.querySelector('.jianpu-display');
                const dotSpan = testTarget.querySelector('.dot-above');
                jianpuSpan.childNodes.forEach(c => { if (c !== dotSpan) c.remove(); });
                jianpuSpan.insertBefore(document.createTextNode(note.jianpuNum), dotSpan || jianpuSpan.firstChild);
                dotSpan.textContent = '·'.repeat(note.dotsAbove);
                testScore.textContent = `✅ ${testCorrectCount}`;
                testFeedback.textContent = '';
                testFeedback.className = 'test-feedback';
            }

            function pickNewTestNote() {
                let newNote;
                do {
                    newNote = getRandomNote();
                } while (testCurrentNote && newNote.index === testCurrentNote.index && noteData.length > 1);
                testCurrentNote = newNote;
                updateTestDisplay();
            }

            function handleTestAnswer(keyIndex) {
                const pressedNote = noteData[keyIndex];
                if (!pressedNote || !testCurrentNote) return;
                if (pressedNote.index === testCurrentNote.index) {
                    testCorrectCount++;
                    testScore.textContent = `✅ ${testCorrectCount}`;
                    testFeedback.textContent = '✓ 正确！';
                    testFeedback.className = 'test-feedback correct';
                    if (testFeedbackTimeout) clearTimeout(testFeedbackTimeout);
                    testFeedbackTimeout = setTimeout(() => {
                        testFeedback.textContent = '';
                        testFeedback.className = 'test-feedback';
                    }, 800);
                    setTimeout(() => { if (currentMode === 'test') pickNewTestNote(); }, 600);
                } else {
                    recordFrequency(errorKeyName, pressedNote.index.toString(), 1);
                    recordFrequency(errorKeyName, testCurrentNote.index.toString(), 1);
                    testFeedback.textContent = '✗ 再试一次';
                    testFeedback.className = 'test-feedback wrong';
                    if (testFeedbackTimeout) clearTimeout(testFeedbackTimeout);
                    testFeedbackTimeout = setTimeout(() => {
                        testFeedback.textContent = '';
                        testFeedback.className = 'test-feedback';
                    }, 900);
                }
            }

            // ============ 曲谱模式逻辑 ============
            function normalizeTarget(scoreEntry) {
                const arr = Array.isArray(scoreEntry) ? scoreEntry : [scoreEntry];
                return arr.sort((a, b) => a - b);
            }

            function updateScoreHighlight() {
                // 清除所有高亮
                keyPathElements.forEach(el => el.classList.remove('score-highlight'));
                // 高亮目标键
                targetIndices.forEach(idx => {
                    if (keyPathElements[idx]) keyPathElements[idx].classList.add('score-highlight');
                });
            }

            function updateScoreDisplay() {
                const notes = targetIndices.map(i => noteData[i]);
                const nameStr = notes.map(n => n.name).join('+');
                scoreTarget.querySelector('.note-names').textContent = nameStr;

                // 简谱显示（取第一个音符为代表）
                const firstNote = notes[0];
                const jianpuSpan = scoreTarget.querySelector('.jianpu-display');
                const dotSpan = scoreTarget.querySelector('.dot-above');
                jianpuSpan.childNodes.forEach(c => { if (c !== dotSpan) c.remove(); });
                jianpuSpan.insertBefore(document.createTextNode(firstNote.jianpuNum), dotSpan || jianpuSpan.firstChild);
                dotSpan.textContent = '·'.repeat(firstNote.dotsAbove);

                scoreProgress.textContent = `${scoreIndex + 1}/${demoScore.length}`;
                scoreFeedback.textContent = '';
                scoreFeedback.className = 'score-feedback';
            }

            function advanceScore() {
                if (scoreIndex < demoScore.length - 1) {
                    scoreIndex++;
                } else {
                    // 循环或结束：这里选择循环到开头
                    scoreIndex = 0;
                }
                targetIndices = normalizeTarget(demoScore[scoreIndex]);
                updateScoreHighlight();
                updateScoreDisplay();
            }

            function onScoreCorrect() {
                // 正确反馈
                scoreFeedback.textContent = '✓ 正确！';
                scoreFeedback.className = 'score-feedback correct';
                setTimeout(() => {
                    if (currentMode === 'score') {
                        scoreFeedback.textContent = '';
                        scoreFeedback.className = 'score-feedback';
                    }
                }, 800);

                // 设置等待释放状态
                waitingForRelease = true;
                canMatch = false;
                matchingPointers = new Set(pointerKeyMap.keys());

                // 前进到下一目标
                advanceScore();
            }

            function onScoreInputChange() {
                if (!canMatch || waitingForRelease) return;

                // 检查当前按下集合是否等于目标集合
                if (pressedIndices.size !== targetIndices.length) return;
                const sortedPressed = [...pressedIndices].sort((a, b) => a - b);
                if (sortedPressed.every((val, i) => val === targetIndices[i])) {
                    onScoreCorrect();
                }
                // 按错无提示，静待修正
            }

            function enterScoreMode() {
                if (currentMode === 'score') return;
                // 退出其他模式
                if (currentMode === 'test') exitTestMode();
                currentMode = 'score';

                // 初始化状态
                scoreIndex = 0;
                targetIndices = normalizeTarget(demoScore[scoreIndex]);
                pressedIndices.clear();
                waitingForRelease = false;
                canMatch = true;
                matchingPointers.clear();

                // UI更新
                kalimbaWrapper.classList.remove('test-mode-active');
                scorePanel.classList.remove('hidden');
                updateScoreHighlight();
                updateScoreDisplay();
                scoreModeBtn.classList.add('accent');
            }

            function exitScoreMode() {
                currentMode = 'free';
                scorePanel.classList.add('hidden');
                // 清除高亮
                keyPathElements.forEach(el => el.classList.remove('score-highlight'));
                scoreModeBtn.classList.remove('accent');
            }

            // ============ 模式切换入口 ============
            function enterTestMode() {
                if (currentMode === 'test') return;
                if (currentMode === 'score') exitScoreMode();
                currentMode = 'test';
                testCorrectCount = 0;
                testCurrentNote = null;
                kalimbaWrapper.classList.add('test-mode-active');
                testPanel.classList.remove('hidden');
                testToggleBtn.textContent = '退出测试';
                testToggleBtn.classList.add('accent');
                testFeedback.textContent = '';
                testFeedback.className = 'test-feedback';
                testScore.textContent = '✅ 0';
                testModeBtn.classList.add('accent');
                pickNewTestNote();
            }

            function exitTestMode() {
                currentMode = 'free';
                testCurrentNote = null;
                kalimbaWrapper.classList.remove('test-mode-active');
                testPanel.classList.add('hidden');
                testFeedback.textContent = '';
                testFeedback.className = 'test-feedback';
                if (testFeedbackTimeout) clearTimeout(testFeedbackTimeout);
                testToggleBtn.textContent = '退出测试';
                testToggleBtn.classList.remove('accent');
                testModeBtn.classList.remove('accent');
            }

            function toggleTestMode() {
                if (currentMode === 'test') {
                    exitTestMode();
                } else {
                    enterTestMode();
                }
            }

            function toggleScoreMode() {
                if (currentMode === 'score') {
                    exitScoreMode();
                } else {
                    enterScoreMode();
                }
            }

            testToggleBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                exitTestMode();
            });

            scoreExitBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                exitScoreMode();
            });

            testModeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentMode === 'test') {
                    exitTestMode();
                } else {
                    enterTestMode();
                }
            });

            scoreModeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentMode === 'score') {
                    exitScoreMode();
                } else {
                    enterScoreMode();
                }
            });

            // 面板阻止冒泡以免触发琴键
            testPanel.addEventListener('pointerdown', e => e.stopPropagation());
            scorePanel.addEventListener('pointerdown', e => e.stopPropagation());

            // ============ 全屏 ============
            function isFullscreen() {
                return !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
            }

            function enterFullscreen() {
                const el = document.documentElement;
                if (el.requestFullscreen) el.requestFullscreen().catch(() => { });
                else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
                else if (el.msRequestFullscreen) el.msRequestFullscreen();
            }

            function exitFullscreen() {
                if (document.exitFullscreen) document.exitFullscreen().catch(() => { });
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                else if (document.msExitFullscreen) document.msExitFullscreen();
            }

            function toggleFullscreen() {
                isFullscreen() ? exitFullscreen() : enterFullscreen();
                // 全屏不再自动进入测试模式，保持当前模式
            }

            function updateFullscreenUI() {
                const fs = isFullscreen();
                document.body.classList.toggle('fullscreen-mode', fs);
                fullscreenBtn.textContent = '⛶';
                fullscreenBtn.title = fs ? '退出全屏' : '全屏模式（推荐横屏）';
            }

            fullscreenBtn.addEventListener('click', e => {
                e.stopPropagation();
                toggleFullscreen();
            });
            fullscreenBtn.addEventListener('pointerdown', e => e.stopPropagation());
            document.addEventListener('fullscreenchange', updateFullscreenUI);
            document.addEventListener('webkitfullscreenchange', updateFullscreenUI);
            document.addEventListener('msfullscreenchange', updateFullscreenUI);
            updateFullscreenUI();

            // ============ 键盘快捷键 ============
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
                if (e.key === 't' || e.key === 'T') {
                    if (!e.ctrlKey && !e.metaKey && !e.altKey) toggleTestMode();
                } else if (e.key === 's' || e.key === 'S') {
                    if (!e.ctrlKey && !e.metaKey && !e.altKey) toggleScoreMode();
                } else if (e.key === 'f' || e.key === 'F') {
                    if (!e.ctrlKey && !e.metaKey && !e.altKey) toggleFullscreen();
                }
                const keyMap = { '1': 8, '2': 7, '3': 9, '4': 6, '5': 10, '6': 5, '7': 11 };
                if (keyMap[e.key] !== undefined && !e.ctrlKey && !e.metaKey && !e.altKey) {
                    triggerNote(keyMap[e.key]);
                }
            });

            // ============ 初始化 ============
            function init() {
                try { getAudioContext(); } catch (e) { }
                // 初始化错误频率存储
                for (let idx = 0; idx < noteData.length; idx++) {
                    recordFrequency(errorKeyName, noteData[idx].index.toString(), 1);
                }
                randomArray = randomExtract(errorKeyName, randomArrayMaxLen);
                // 默认模式为自由演奏，无面板
            }

            init();

            function handleResize() {
                updateFullscreenUI();
                const isLandscape = window.innerWidth > window.innerHeight;
                if (isFullscreen() && isLandscape) {
                    kalimbaWrapper.style.maxWidth = '95vw';
                } else if (isFullscreen()) {
                    kalimbaWrapper.style.maxWidth = '100%';
                } else {
                    kalimbaWrapper.style.maxWidth = '850px';
                }
            }
            window.addEventListener('resize', handleResize);
            window.addEventListener('orientationchange', () => setTimeout(handleResize, 300));
            handleResize();
        })();
    </script>
</body>
